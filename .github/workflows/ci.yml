name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Check module files
        run: go mod tidy -diff
      - name: Static analysis
        run: go vet ./...
      - name: Race tests
        run: go test ./... -race
      - name: Exact coverage
        run: ./scripts/check-coverage.sh
      - name: Documentation and examples
        run: ./scripts/check-docs.sh
      - name: Benchmark smoke
        run: go test ./... -run '^$' -bench . -benchtime=100ms

  compatibility:
    name: Go ${{ matrix.go }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go:
          - 1.24.x
          - stable
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go.sum
      - run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  fuzz-smoke:
    name: Fuzz smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzUnmarshal
          - FuzzUnmarshalAtomic
          - FuzzParseQuery
          - FuzzCursorPaginationQuery
          - FuzzNegotiation
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test ./... -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime=2s
