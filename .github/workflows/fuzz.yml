name: Scheduled fuzzing

on:
  schedule:
    - cron: "23 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzUnmarshal
          - FuzzUnmarshalAtomic
          - FuzzParseQuery
          - FuzzCursorPaginationQuery
          - FuzzNegotiation
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test ./... -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime=5m
